version: "3"

tasks:
  test:
    cmds:
      - |
          bash <<'EOF'
          set -euo pipefail
          source ../_lib/run.sh

          set +e
          actual="$(cli version 2>&1)"
          status=$?
          set -e

          [[ "$status" -eq 0 ]] || { printf 'expected cli version exit 0, got %s\noutput:\n%s\n' "$status" "$actual" >&2; exit 1; }

          if ! grep -Eq '(^|[^[:alnum:].-])v?[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)*([^[:alnum:].-]|$)' <<<"$actual"; then
            printf 'expected SemVer output matching vN.N.N or N.N.N\n' >&2
            printf 'output:\n' >&2
            printf '%s\n' "$actual" >&2
            exit 1
          fi
          EOF
